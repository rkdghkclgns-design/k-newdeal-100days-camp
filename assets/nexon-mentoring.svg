<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="넥슨 현직자 강의 &amp; 1:1 멘토링">
  <defs>
    <linearGradient id="m_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171c2a"/><stop offset="1" stop-color="#0b0d13"/>
    </linearGradient>
    <radialGradient id="m_glow" cx="50%" cy="34%" r="60%">
      <stop offset="0" stop-color="#2f6bff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2f6bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="m_blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b8bff"/><stop offset="1" stop-color="#2f6bff"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" fill="url(#m_bg)"/>
  <rect width="480" height="300" fill="url(#m_glow)"/>

  <!-- 1:1 connection -->
  <line x1="172" y1="212" x2="308" y2="212" stroke="#2f6bff" stroke-opacity="0.4" stroke-width="2.5" stroke-dasharray="2 9" stroke-linecap="round"/>

  <!-- mentor (left, headset) -->
  <g transform="translate(172,150)">
    <path d="M-58 74 C-58 22 -30 -4 0 -4 C30 -4 58 22 58 74 Z" fill="url(#m_blue)"/>
    <circle cy="-42" r="38" fill="url(#m_blue)"/>
    <path d="M-34 -52 a34 34 0 0 1 68 0" fill="none" stroke="#cfe0ff" stroke-width="6" stroke-linecap="round"/>
    <rect x="-45" y="-54" width="13" height="22" rx="6" fill="#cfe0ff"/>
    <rect x="32" y="-54" width="13" height="22" rx="6" fill="#cfe0ff"/>
    <path d="M38 -34 q11 8 3 26" fill="none" stroke="#cfe0ff" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="41" cy="-6" r="3.6" fill="#cfe0ff"/>
  </g>

  <!-- mentee (right, smaller) -->
  <g transform="translate(308,166)" opacity="0.95">
    <path d="M-47 60 C-47 18 -24 -2 0 -2 C24 -2 47 18 47 60 Z" fill="#3a5db0"/>
    <circle cy="-34" r="30" fill="#3a5db0"/>
  </g>

  <!-- speech bubble (lecture) -->
  <g transform="translate(240,76)">
    <rect x="-60" y="-32" width="120" height="60" rx="17" fill="#2f6bff"/>
    <path d="M-24 26 l4 22 21 -21 Z" fill="#2f6bff"/>
    <circle cx="-22" cy="-2" r="6.5" fill="#fff"/>
    <circle cx="0" cy="-2" r="6.5" fill="#fff"/>
    <circle cx="22" cy="-2" r="6.5" fill="#fff"/>
  </g>

  <!-- 1:1 badge -->
  <g transform="translate(374,84)">
    <circle r="24" fill="#0b0d13" stroke="#5b8bff" stroke-width="2.5"/>
    <text x="0" y="7" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="19" font-weight="800" fill="#9dc0ff">1:1</text>
  </g>

  <!-- sparkles -->
  <g fill="#9dc0ff"><circle cx="108" cy="92" r="2.4"/><circle cx="404" cy="156" r="2"/><circle cx="150" cy="58" r="1.8"/></g>
</svg>
