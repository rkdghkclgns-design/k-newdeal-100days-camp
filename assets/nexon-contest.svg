<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="메이플스토리 글로벌 개발 콘테스트 — 최대 상금 9,000만원">
  <defs>
    <linearGradient id="c_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1e2b"/><stop offset="1" stop-color="#0b0d13"/>
    </linearGradient>
    <radialGradient id="c_glow" cx="50%" cy="30%" r="60%">
      <stop offset="0" stop-color="#f5a623" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="c_gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe08a"/><stop offset="0.5" stop-color="#f5a623"/><stop offset="1" stop-color="#d97b06"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" fill="url(#c_bg)"/>
  <rect width="480" height="300" fill="url(#c_glow)"/>

  <!-- globe behind (global stage) -->
  <g transform="translate(240,150)" stroke="#6a9bcc" fill="none">
    <circle r="84" stroke-opacity="0.22" stroke-width="2"/>
    <ellipse rx="84" ry="32" stroke-opacity="0.16" stroke-width="1.5"/>
    <ellipse rx="44" ry="84" stroke-opacity="0.16" stroke-width="1.5"/>
    <line x1="-84" y1="0" x2="84" y2="0" stroke-opacity="0.16" stroke-width="1.5"/>
  </g>

  <!-- trophy -->
  <g transform="translate(240,96)">
    <path d="M-48 4 q-30 0 -30 28 q0 24 30 26" fill="none" stroke="url(#c_gold)" stroke-width="9" stroke-linecap="round"/>
    <path d="M48 4 q30 0 30 28 q0 24 -30 26" fill="none" stroke="url(#c_gold)" stroke-width="9" stroke-linecap="round"/>
    <rect x="-54" y="-16" width="108" height="14" rx="7" fill="#ffe7ad"/>
    <path d="M-48 -2 H48 V6 q0 50 -48 56 q-48 -6 -48 -56 Z" fill="url(#c_gold)"/>
    <g transform="translate(0,30)">
      <path d="M0,-16 L4.7,-5.2 L15.2,-4.9 L6.9,2 L9.4,12.9 L0,6.6 L-9.4,12.9 L-6.9,2 L-15.2,-4.9 L-4.7,-5.2 Z" fill="#9a5a07"/>
    </g>
    <rect x="-8" y="60" width="16" height="22" fill="#caa24a"/>
    <path d="M-30 92 H30 l-7 -12 H-23 Z" fill="url(#c_gold)"/>
    <rect x="-40" y="92" width="80" height="11" rx="3" fill="#ffe7ad"/>
  </g>

  <!-- pixel platforms (MapleStory side-scroller nod) -->
  <g>
    <rect x="44" y="236" width="84" height="16" rx="3" fill="#1fae7a"/>
    <rect x="44" y="236" width="84" height="5" rx="2" fill="#4ad9a0"/>
    <rect x="352" y="250" width="84" height="16" rx="3" fill="#1fae7a"/>
    <rect x="352" y="250" width="84" height="5" rx="2" fill="#4ad9a0"/>
  </g>

  <!-- orange mushroom (메이플 시그니처) -->
  <g transform="translate(386,234)">
    <rect x="-13" y="-2" width="26" height="15" rx="7" fill="#ff7a3d"/>
    <ellipse cx="-4.5" cy="2" rx="3" ry="3.4" fill="#fff"/>
    <ellipse cx="5.5" cy="2" rx="3" ry="3.4" fill="#fff"/>
    <circle cx="-4.5" cy="2.8" r="1.5" fill="#3a1c0e"/>
    <circle cx="5.5" cy="2.8" r="1.5" fill="#3a1c0e"/>
    <rect x="-7" y="11" width="14" height="9" rx="2" fill="#ffd7bd"/>
  </g>

  <!-- sparkles -->
  <g fill="#ffe08a">
    <path d="M122 70 l3.4 9 9 3.4 -9 3.4 -3.4 9 -3.4 -9 -9 -3.4 9 -3.4 Z"/>
    <path d="M360 84 l2.6 7 7 2.6 -7 2.6 -2.6 7 -2.6 -7 -7 -2.6 7 -2.6 Z"/>
    <path d="M300 54 l2 5.4 5.4 2 -5.4 2 -2 5.4 -2 -5.4 -5.4 -2 5.4 -2 Z"/>
    <circle cx="150" cy="120" r="2.2"/><circle cx="338" cy="138" r="2"/>
  </g>
</svg>
